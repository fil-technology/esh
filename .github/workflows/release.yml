name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the packaged artifact, for example 0.1.0"
        required: false
      publish_release:
        description: "Publish a GitHub release for this build"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HOMEBREW_TAP_REPO: fil-technology/homebrew-tap

jobs:
  package-macos:
    name: Package macOS Release
    runs-on: macos-26
    timeout-minutes: 90

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Select Xcode with Swift 6.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Install llama.cpp
        run: brew install llama.cpp

      - name: Resolve release version
        id: version
        run: |
          chmod +x ./scripts/release-version.sh
          FILE_VERSION="$(./scripts/release-version.sh show)"
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            [[ "$TAG_VERSION" == "$FILE_VERSION" ]] || {
              echo "Tag version $TAG_VERSION does not match VERSION $FILE_VERSION" >&2
              exit 1
            }
            VERSION="$TAG_VERSION"
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="$FILE_VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build self-contained release package
        run: ./scripts/package-release.sh "${{ steps.version.outputs.version }}"

      - name: Smoke test packaged artifact
        run: bash ./scripts/smoke-test-package.sh "dist/esh-macos-${{ steps.version.outputs.version }}"

      - name: Require Apple signing secrets
        if: github.event_name == 'push' || inputs.publish_release
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_P8: ${{ secrets.APPLE_API_PRIVATE_KEY_P8 }}
        run: |
          missing=0
          for name in APPLE_DEVELOPER_ID APPLE_TEAM_ID APPLE_CERT_P12_BASE64 APPLE_CERT_PASSWORD APPLE_API_KEY_ID APPLE_API_ISSUER_ID APPLE_API_PRIVATE_KEY_P8; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required secret: $name" >&2
              missing=1
            fi
          done
          [[ "$missing" -eq 0 ]]

      - name: Import Apple signing certificate
        if: github.event_name == 'push' || inputs.publish_release
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          CERT_PATH: ${{ runner.temp }}/esh-signing-cert.p12
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/esh-signing.keychain-db"
          CERT_PATH="$RUNNER_TEMP/esh-signing-cert.p12"
          python3 - <<'PY'
          import base64, os, pathlib
          pathlib.Path(os.environ["CERT_PATH"]).write_bytes(base64.b64decode(os.environ["APPLE_CERT_P12_BASE64"]))
          PY
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" "$KEYCHAIN_PATH"

      - name: Sign release payload
        if: github.event_name == 'push' || inputs.publish_release
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          chmod +x ./scripts/sign-release.sh
          ./scripts/sign-release.sh "dist/esh-macos-${{ steps.version.outputs.version }}"

      - name: Build notarized zip archive
        if: github.event_name == 'push' || inputs.publish_release
        run: |
          rm -f "dist/esh-macos-${{ steps.version.outputs.version }}.zip"
          ditto -c -k --keepParent \
            "dist/esh-macos-${{ steps.version.outputs.version }}" \
            "dist/esh-macos-${{ steps.version.outputs.version }}.zip"

      - name: Notarize release archive
        if: github.event_name == 'push' || inputs.publish_release
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_P8: ${{ secrets.APPLE_API_PRIVATE_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          chmod +x ./scripts/notarize-release.sh
          ./scripts/notarize-release.sh "dist/esh-macos-${{ steps.version.outputs.version }}.zip"

      - name: Compute release checksums
        run: |
          shasum -a 256 "dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz" > "dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz.sha256"
          shasum -a 256 "dist/esh-macos-${{ steps.version.outputs.version }}.zip" > "dist/esh-macos-${{ steps.version.outputs.version }}.zip.sha256"
          TAR_SHA256="$(awk '{print $1}' "dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz.sha256")"
          ZIP_SHA256="$(awk '{print $1}' "dist/esh-macos-${{ steps.version.outputs.version }}.zip.sha256")"
          echo "tar_sha256=$TAR_SHA256" >> "$GITHUB_ENV"
          echo "zip_sha256=$ZIP_SHA256" >> "$GITHUB_ENV"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esh-macos-${{ steps.version.outputs.version }}
          path: |
            dist/esh-macos-${{ steps.version.outputs.version }}
            dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz
            dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz.sha256
            dist/esh-macos-${{ steps.version.outputs.version }}.zip
            dist/esh-macos-${{ steps.version.outputs.version }}.zip.sha256
          if-no-files-found: error

      - name: Install ORAS
        run: brew install oras

      - name: Publish GitHub package
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_REF: ghcr.io/${{ github.repository }}/esh-macos:${{ steps.version.outputs.version }}
        run: |
          echo "$GHCR_TOKEN" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          oras push "$PACKAGE_REF" \
            --artifact-type application/vnd.fil-technology.esh.release.v1+tar.gz \
            --annotation "org.opencontainers.image.title=esh-macos-${{ steps.version.outputs.version }}.tar.gz" \
            --annotation "org.opencontainers.image.description=Self-contained Esh macOS release bundle" \
            --annotation "org.opencontainers.image.version=${{ steps.version.outputs.version }}" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
            --annotation "org.opencontainers.image.revision=${{ github.sha }}" \
            "dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz:application/gzip" \
            "dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz.sha256:text/plain"

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Esh ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz
            dist/esh-macos-${{ steps.version.outputs.version }}.tar.gz.sha256
            dist/esh-macos-${{ steps.version.outputs.version }}.zip
            dist/esh-macos-${{ steps.version.outputs.version }}.zip.sha256

      - name: Check out Homebrew tap
        if: github.event_name == 'push' && env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HOMEBREW_TAP_REPO }}
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        if: github.event_name == 'push' && env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          chmod +x ./scripts/generate-homebrew-cask.sh
          mkdir -p homebrew-tap/Casks
          rm -f homebrew-tap/Formula/esh.rb
          ./scripts/generate-homebrew-cask.sh "${{ steps.version.outputs.version }}" "$zip_sha256" > homebrew-tap/Casks/esh.rb
          cat > homebrew-tap/README.md <<'EOF'
          # fil-technology/homebrew-tap

          Homebrew tap for Esh cask.

          ## Install

          ```bash
          brew tap fil-technology/tap
          brew install --cask esh
          ```
          EOF

      - name: Publish Homebrew tap update
        if: github.event_name == 'push' && env.HOMEBREW_TAP_TOKEN != ''
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        working-directory: homebrew-tap
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/esh.rb README.md
          git rm -f Formula/esh.rb || true
          git commit -m "esh ${{ steps.version.outputs.version }}"
          git push
