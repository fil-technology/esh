name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version label for the packaged artifact, for example 0.1.0"
        required: true
      publish_release:
        description: "Publish a GitHub release for this build"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-macos:
    name: Package macOS Release
    runs-on: macos-14
    timeout-minutes: 90

    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Select Xcode with Swift 6
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "latest-stable"

      - name: Build self-contained release package
        run: ./scripts/package-release.sh "$VERSION"

      - name: Compute release checksums
        run: |
          shasum -a 256 "dist/esh-macos-$VERSION.tar.gz" > "dist/esh-macos-$VERSION.tar.gz.sha256"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esh-macos-${{ env.VERSION }}
          path: |
            dist/esh-macos-${{ env.VERSION }}
            dist/esh-macos-${{ env.VERSION }}.tar.gz
            dist/esh-macos-${{ env.VERSION }}.tar.gz.sha256
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', inputs.version) }}
          target_commitish: ${{ github.sha }}
          name: Esh ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/esh-macos-${{ env.VERSION }}.tar.gz
            dist/esh-macos-${{ env.VERSION }}.tar.gz.sha256
